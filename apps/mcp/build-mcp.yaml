# Cloud Build config for apps/mcp. Run from the repo root:
#   gcloud builds submit --config=apps/mcp/build-mcp.yaml \
#     --substitutions=_REGION=us-central1,_REGISTRY_NAME=axiomflow,_SERVICE_NAME=axiomflow-mcp .
#
# Tags images :latest only (no :$SHORT_SHA) — this is submitted directly via
# `gcloud builds submit`, not a source-repo trigger, so $SHORT_SHA is never populated.
substitutions:
  _REGION: us-central1
  _REGISTRY_NAME: axiomflow
  _SERVICE_NAME: axiomflow-mcp

steps:
  - name: gcr.io/cloud-builders/docker
    id: build
    args:
      - build
      - -f
      - apps/mcp/Dockerfile
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REGISTRY_NAME}/mcp:latest
      - .

  - name: gcr.io/cloud-builders/docker
    id: push
    args:
      - push
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REGISTRY_NAME}/mcp:latest
    waitFor: [build]

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: deploy
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE_NAME}
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REGISTRY_NAME}/mcp:latest
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --port=8080
    waitFor: [push]

  # `--allow-unauthenticated` above has occasionally failed to attach the allUsers/run.invoker
  # binding silently; this makes public access explicit and idempotent on every deploy.
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: allow-public-access
    entrypoint: gcloud
    args:
      - run
      - services
      - add-iam-policy-binding
      - ${_SERVICE_NAME}
      - --region=${_REGION}
      - --member=allUsers
      - --role=roles/run.invoker
    waitFor: [deploy]

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REGISTRY_NAME}/mcp:latest

options:
  logging: CLOUD_LOGGING_ONLY
