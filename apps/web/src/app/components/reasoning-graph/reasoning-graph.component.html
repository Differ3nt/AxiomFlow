<div class="graph-container">
  <div class="graph-main">
    <ngx-graph
      [links]="links()"
      [nodes]="nodes()"
      [layout]="'dagre'">
      
      <ng-template #defsTemplate>
        <svg:marker id="arrow" viewBox="0 -5 10 10" refX="8" refY="0" markerWidth="4" markerHeight="4" orient="auto">
          <svg:path d="M0,-5L10,0L0,5" class="arrow-head" />
        </svg:marker>
      </ng-template>

      <ng-template #nodeTemplate let-node>
        <svg:g class="node" (click)="onNodeClick(node)">
          <svg:rect
            [attr.width]="node.dimension.width"
            [attr.height]="node.dimension.height"
            [attr.fill]="node.id === selectedNode()?.id ? 'var(--accent)' : 'var(--card)'"
            rx="4" ry="4" stroke="var(--border)" stroke-width="1" />
          <svg:text alignment-baseline="central" [attr.x]="10" [attr.y]="node.dimension.height / 2" [attr.fill]="node.id === selectedNode()?.id ? 'var(--bg)' : 'var(--text)'">
            {{node.label}}
          </svg:text>
        </svg:g>
      </ng-template>

      <ng-template #linkTemplate let-link>
        <svg:g class="edge">
          <svg:path class="line" stroke-width="2" marker-end="url(#arrow)"></svg:path>
          <svg:text class="edge-label" text-anchor="middle">
            <textPath class="text-path" [attr.href]="'#' + link.id" [style.dominant-baseline]="link.dominantBaseline" startOffset="50%">
              {{link.label}}
            </textPath>
          </svg:text>
        </svg:g>
      </ng-template>
    </ngx-graph>
  </div>
  
  <aside class="graph-side" *ngIf="selectedNode() as nodeData">
    <h3>{{nodeData.nodeName}}</h3>
    <p class="meta">Latency: {{nodeData.latencyMs}}ms</p>
    
    <div class="data-block" *ngIf="nodeData.input">
      <h4>Input</h4>
      <pre>{{nodeData.input | json}}</pre>
    </div>
    
    <div class="data-block" *ngIf="nodeData.output">
      <h4>Output</h4>
      <pre>{{nodeData.output | json}}</pre>
    </div>
    
    <div class="data-block" *ngIf="nodeData.raw">
      <h4>Raw / Verdict</h4>
      <pre>{{nodeData.raw | json}}</pre>
    </div>
  </aside>
</div>
