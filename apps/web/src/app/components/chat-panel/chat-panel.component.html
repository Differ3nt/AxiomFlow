<!-- Overlay -->
<div class="overlay" (click)="store.closeChat()" aria-hidden="true"></div>

<!-- Panel -->
<aside
  id="chat-panel"
  role="dialog"
  aria-label="R&D assistant"
  aria-modal="true"
  class="panel"
>
  <div class="panel__header">
    <div class="panel__title">◈ R&amp;D Assistant</div>
    <button
      class="close-btn"
      (click)="store.closeChat()"
      aria-label="Close"
    >✕</button>
  </div>

  <div class="panel__body" #chatBody>
    @if (store.chatMessages().length === 0) {
      <div class="empty-state">
        <div class="empty-icon">◈</div>
        <div class="empty-text">Ask anything about this investigation</div>
        <div class="suggestions">
          @for (p of suggestedPrompts; track p) {
            <button class="suggestion-chip" (click)="useChip(p)">{{ p }}</button>
          }
        </div>
      </div>
    } @else {
      <div class="messages">
        @for (msg of store.chatMessages(); track $index) {
          <div class="message" [class.message--user]="msg.role === 'user'" [class.message--assistant]="msg.role === 'assistant'">
            <div class="message__bubble">{{ msg.text }}</div>
          </div>
        }
        @if (store.chatLoading()) {
          <div class="message message--assistant">
            <div class="message__bubble message__bubble--loading">
              <span class="dot"></span><span class="dot"></span><span class="dot"></span>
            </div>
          </div>
        }
      </div>
    }
  </div>

  <div class="panel__input-bar">
    <input
      id="chat-message"
      name="chat-message"
      class="input"
      aria-label="Message the assistant"
      placeholder="Ask anything about this investigation…"
      [ngModel]="store.chatInput()"
      (ngModelChange)="store.setChatInput($event)"
      (keydown)="onKeydown($event)"
      [disabled]="store.chatLoading()"
    />
    <button
      class="send-btn"
      aria-label="Send"
      (click)="send()"
      [disabled]="store.chatLoading() || !store.chatInput().trim()"
    >➤</button>
  </div>
</aside>
